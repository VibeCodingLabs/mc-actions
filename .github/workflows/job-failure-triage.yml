name: Failure Triage
on:
  workflow_run:
    workflows: ["Job Dispatcher"]
    types: [completed]
permissions:
  issues: write
  contents: read
jobs:
  triage:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: [self-hosted, debian-13]
    steps:
      - uses: actions/checkout@v7
      - name: Download failure artifact
        uses: actions/download-artifact@v5
        with:
          name: failure-report
          path: ${{ runner.temp }}/artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Create triage issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = require('path');
            let report = {};
            try {
              report = JSON.parse(fs.readFileSync(
                path.join('${{ runner.temp }}/artifacts', 'failure.json'), 'utf8'));
            } catch (_) {
              report = { workflow: '${{ github.event.workflow_run.name }}', error: 'No artifact' };
            }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[Triage] ${{ github.event.workflow_run.name }} failed — run #${{ github.event.workflow_run.run_number }}`,
              body: [
                '## 🚨 Workflow Failure Report', '',
                '```json', JSON.stringify(report, null, 2), '```', '',
                `**Run:** [${{ github.event.workflow_run.run_number }}](${{ github.event.workflow_run.html_url }})`, '',
                '@jules please review and fix',
                '@moonclaw analyze root cause',
              ].join('\n'),
              labels: ['triage', 'automated', 'failure'],
            });
