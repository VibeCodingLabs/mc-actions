name: Comment Router
on: issue_comment
permissions:
  issues: write
  pull-requests: write
  contents: read
jobs:
  route_issue_comment:
    name: Route @moonclaw on issue
    if: |
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@moonclaw')
    runs-on: [self-hosted, debian-13]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue.number;
            const body  = context.payload.comment.body;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: '🌙 **Moonclaw** is processing your request...',
            });
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: '01-job-dispatch.yml', ref: 'main',
              inputs: { issue_number: String(issue), command: body },
            });
  route_pr_comment:
    name: Route @moonclaw on PR
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@moonclaw')
    runs-on: [self-hosted, debian-13]
    steps:
      - uses: actions/checkout@v7
      - run: echo "PR #${{ github.event.issue.number }} routed to review agent"
