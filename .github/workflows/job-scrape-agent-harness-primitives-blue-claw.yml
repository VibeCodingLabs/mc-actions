name: Job — scrape-agent-harness-primitives-blue-claw
on:
  workflow_dispatch:
    inputs:
      job_id: { required: true, type: string }
      payload: { required: false, type: string, default: '{}' }
  workflow_call:
    inputs:
      job_id: { required: true, type: string }
      payload: { required: false, type: string, default: '{}' }
    outputs:
      result: { value: "${{ jobs.execute.outputs.result }}" }
      status: { value: "${{ jobs.execute.outputs.status }}" }
concurrency:
  group: scrape-blue-claw-${{ inputs.job_id }}
  cancel-in-progress: false
permissions:
  contents: read
  issues: write
jobs:
  execute:
    runs-on: [self-hosted, debian-13]
    outputs:
      result: ${{ steps.scrape.outputs.result }}
      status: ${{ steps.scrape.outputs.status }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -q firecrawl-py python-dotenv pydantic loguru
      - name: Run scrape agent
        id: scrape
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          JOB_ID: ${{ inputs.job_id }}
        run: |
          python orchestrator/agents/scrape_agent.py
          RESULT=$(jq -n --arg id "$JOB_ID" '{job_id:$id,slug:"scrape-blue-claw",status:"completed"}')
          echo "result=$RESULT"   >> $GITHUB_OUTPUT
          echo "status=completed" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scrape-result-${{ inputs.job_id }}
          path: output/
          retention-days: 7
      - name: Trigger parse step
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'job-parse-primitives.yml', ref: 'main',
              inputs: { job_id: '${{ inputs.job_id }}-parse', payload: '{}' },
            });
